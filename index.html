<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>THE BUREAU // NODE_7</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
/* ========================================
   1. CORE VARS & KINETICS
   ======================================== */
:root {
  --accent: #d4af37;
  --accent-dim: #5c4a1e;
  --bg: #050505;
  --panel: #11100e;
  --rust: #3d2b1f;
  --alert: #ff0000;
  --text: #c4beaf;
}

@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    background: var(--bg); color: var(--text); 
    font-family: 'Space Mono', monospace; overflow: hidden; 
    height: 100vh; cursor: crosshair;
}

/* --- THE KINETIC SHAKE --- */
@keyframes rumble {
    0% { transform: translate(0,0); }
    10% { transform: translate(-2px, -2px); }
    20% { transform: translate(2px, 2px); }
    30% { transform: translate(-2px, 2px); }
    100% { transform: translate(0,0); }
}
.rumble { animation: rumble 0.2s cubic-bezier(.36,.07,.19,.97) both; }

/* ========================================
   2. VIEW STATES
   ======================================== */
#view-landing, #view-terminal { position: fixed; inset: 0; transition: opacity 1s ease; }
#view-terminal { opacity: 0; pointer-events: none; z-index: 2; }
.hidden { display: none !important; }

/* --- LANDING STYLES --- */
.landing-content {
    height: 100vh; display: flex; flex-direction: column; 
    justify-content: center; align-items: center; text-align: center;
    font-family: 'Inter', sans-serif;
}
.landing-content h1 { font-size: 8vw; font-weight: 900; letter-spacing: -5px; }
.btn-access {
    margin-top: 40px; padding: 20px 60px; background: transparent;
    border: 1px solid var(--accent); color: var(--accent);
    font-family: 'Space Mono'; cursor: pointer; transition: 0.3s;
}
.btn-access:hover { background: var(--accent); color: #000; box-shadow: 0 0 50px rgba(212,175,55,0.3); }

/* --- STATIC OVERLAY (THE BREACH) --- */
#static-overlay {
    position: fixed; inset: 0; z-index: 10000; pointer-events: none;
    background: #fff; opacity: 0;
}

/* ========================================
   3. TERMINAL ARCHITECTURE (REFINED)
   ======================================== */
.app-container {
  display: grid;
  grid-template-columns: 320px 1fr 380px;
  grid-template-rows: 60px 1fr 180px;
  height: 100vh; gap: 10px; padding: 10px;
}
.panel { background: var(--panel); border: 1px solid var(--rust); overflow: hidden; display: flex; flex-direction: column; }
.panel-header { padding: 8px 15px; background: var(--rust); color: var(--accent); font-size: 10px; font-weight: bold; }
canvas { width: 100%; height: 100%; filter: sepia(0.5) contrast(1.2); }
#cli-input { width: 100%; background: transparent; border: 1px solid var(--accent-dim); color: var(--accent); padding: 10px; font-family: inherit; outline: none; }
.nav-item { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.02); cursor: pointer; font-size: 11px; }
.nav-item:hover { background: rgba(212,175,55,0.1); }
.nav-item.active { border-left: 4px solid var(--accent); background: rgba(212,175,55,0.05); }

/* --- CRT FX --- */
.crt::after {
    content: " "; display: block; position: absolute; inset: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
    background-size: 100% 4px; z-index: 10; pointer-events: none;
}
</style>
</head>
<body class="crt">

<div id="static-overlay"></div>

<section id="view-landing">
    <div class="landing-content">
        <h1 id="landing-title">THE BUREAU</h1>
        <p style="color:var(--accent); letter-spacing: 5px;">STATION_7 // PUBLIC_GATEWAY</p>
        <button class="btn-access" onclick="initiateBreach()">INITIALIZE NODE ACCESS</button>
        <div style="position:fixed; bottom:20px; font-size:9px; opacity:0.3;">
            REF_KEY: <span style="color:var(--accent)">WINDEN_33</span>
        </div>
    </div>
</section>

<section id="view-terminal">
    <div class="app-container">
        <header class="panel" style="grid-column: 1/span 3; flex-direction: row; align-items: center; justify-content: space-between; padding: 0 20px;">
            <div style="color:var(--accent); font-weight: bold; letter-spacing: 3px;">INTERNAL_ARCHIVE_7</div>
            <div id="clock">00:00:00</div>
        </header>

        <aside class="panel">
            <div class="panel-header">OBJECT_REGISTRY</div>
            <div id="nav-list" style="overflow-y:auto"></div>
        </aside>

        <main class="panel" style="background:#000;">
            <div class="panel-header">VOID_SCANNER_ACTIVE</div>
            <canvas id="teleCanvas"></canvas>
        </main>

        <aside class="panel">
            <div class="panel-header">MANIFEST_DATA</div>
            <div id="manifest-content" style="padding:20px;">
                <h2 id="obj-title" style="color:var(--accent); margin-bottom:10px;">--</h2>
                <p id="obj-desc" style="font-size:11px; line-height:1.6;"></p>
            </div>
        </aside>

        <footer class="panel" style="grid-column: 1/span 3; display:grid; grid-template-columns: 1fr 400px; padding:15px; gap:20px;">
            <div id="log-stream" style="font-size:9px; color:var(--accent); overflow:hidden;"></div>
            <div>
                <div style="font-size:9px; opacity:0.5; margin-bottom:5px;">COMMAND_INPUT</div>
                <input type="text" id="cli-input" placeholder="ENTER AUTH CODE OR CMD..." autocomplete="off">
            </div>
        </footer>
    </div>
</section>

<script>
/* ========================================
   4. AUDIO ENGINE (GENERATIVE)
   ======================================== */
let audioCtx;
function startAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // Low Brown Noise Hum
    const bufferSize = 4096;
    const brownNoise = (() => {
        let lastOut = 0.0;
        const node = audioCtx.createScriptProcessor(bufferSize, 1, 1);
        node.onaudioprocess = (e) => {
            const output = e.outputBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                const white = Math.random() * 2 - 1;
                output[i] = (lastOut + (0.02 * white)) / 1.02;
                lastOut = output[i];
                output[i] *= 3.5; // volume
            }
        };
        return node;
    })();

    const lowFilter = audioCtx.createBiquadFilter();
    lowFilter.type = 'lowpass';
    lowFilter.frequency.value = 400;

    brownNoise.connect(lowFilter);
    lowFilter.connect(audioCtx.destination);
}

/* ========================================
   5. DATA & LOGIC
   ======================================== */
const data = [
    { id: "01", name: "The Device", desc: "Brass transit apparatus. Requires Cesium injection." },
    { id: "02", name: "The Map", desc: "Detailed layout of the cave system. 1953/1986/2019 intersection." },
    { id: "SECRET", name: "Project Noah", desc: "The cycle is complete. Sic Mundus Creatus Est.", hidden: true }
];

function initiateBreach() {
    startAudio();
    const overlay = document.getElementById('static-overlay');
    document.body.classList.add('rumble');
    
    // The "Glitch" Sequence
    overlay.style.opacity = '1';
    let flashes = 0;
    const interval = setInterval(() => {
        overlay.style.background = flashes % 2 === 0 ? '#fff' : '#000';
        flashes++;
        if(flashes > 10) {
            clearInterval(interval);
            overlay.style.opacity = '0';
            document.getElementById('view-landing').classList.add('hidden');
            document.getElementById('view-terminal').style.opacity = '1';
            document.getElementById('view-terminal').style.pointerEvents = 'all';
            document.body.classList.remove('rumble');
            addLog("CONNECTION ESTABLISHED... NODE_7 ONLINE");
        }
    }, 50);
}

// Terminal Logic
const navList = document.getElementById('nav-list');
function buildNav() {
    navList.innerHTML = '';
    data.filter(i => !i.hidden).forEach(item => {
        const div = document.createElement('div');
        div.className = 'nav-item';
        div.innerText = item.name;
        div.onclick = () => {
            document.getElementById('obj-title').innerText = item.name;
            document.getElementById('obj-desc').innerText = item.desc;
            addLog(`ACCESSING: ${item.name}`);
        };
        navList.appendChild(div);
    });
}
buildNav();

const cli = document.getElementById('cli-input');
cli.onkeydown = (e) => {
    if(e.key === 'Enter') {
        const val = cli.value.toUpperCase();
        addLog(`CMD: ${val}`);
        if(val === 'WINDEN_33') {
            addLog("!!! ACCESS GRANTED: SECRET_ARCHIVE_UNLOCKED");
            data[2].hidden = false;
            buildNav();
            document.body.classList.add('rumble');
            setTimeout(() => document.body.classList.remove('rumble'), 500);
        } else if (val === 'PURGE') {
            document.body.style.filter = "invert(1)";
            setTimeout(() => document.body.style.filter = "none", 200);
        }
        cli.value = '';
    }
};

function addLog(msg) {
    const log = document.getElementById('log-stream');
    const d = document.createElement('div');
    d.innerText = `> ${msg}`;
    log.prepend(d);
}

// Canvas Visualizer
const canvas = document.getElementById('teleCanvas');
const ctx = canvas.getContext('2d');
function draw(t) {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.strokeStyle = '#d4af37';
    ctx.beginPath();
    for(let i=0; i<canvas.width; i+=2) {
        const y = canvas.height/2 + Math.sin(i*0.01 + t*0.002) * 50 + (Math.random()*10);
        ctx.lineTo(i,y);
    }
    ctx.stroke();
    requestAnimationFrame(draw);
}
draw(0);

setInterval(() => {
    document.getElementById('clock').innerText = new Date().toLocaleTimeString();
}, 1000);
</script>
</body>
</html>
