<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>THE BUREAU // SIC MUNDUS // COMMAND CONSOLE</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
/* ============================================================
   1. CORE THEME ENGINE (DYNAMIC VARIABLES)
   ============================================================ */
:root {
  /* Default Theme: 1953 (Amber/Rust CRT) */
  --accent: #d4af37;
  --accent-glow: rgba(212, 175, 55, 0.4);
  --bg-core: #0a0908;
  --panel-bg: rgba(18, 16, 14, 0.85);
  --panel-border: #3d2b1f;
  --text-main: #b5ac9a;
  --text-muted: #6b6456;
  --alert: #ff453a;
  --font-mono: 'Space Mono', monospace;
  --font-sans: 'Inter', system-ui, sans-serif;
  --crt-curve: inset 0 0 60px rgba(0,0,0,0.9);
}

/* Theme Variant: 1986 (Neon/VCR) */
body[data-era="1986"] {
  --accent: #00f3ff;
  --accent-glow: rgba(0, 243, 255, 0.4);
  --bg-core: #050508;
  --panel-bg: rgba(10, 15, 25, 0.85);
  --panel-border: #1a2b4c;
  --text-main: #a3c2ff;
  --text-muted: #4a6b9c;
  --alert: #ff0055;
  --crt-curve: inset 0 0 80px rgba(0,20,40,0.9);
}

/* Theme Variant: 2019 (Sterile/LCD) */
body[data-era="2019"] {
  --accent: #ffffff;
  --accent-glow: rgba(255, 255, 255, 0.3);
  --bg-core: #0f1115;
  --panel-bg: rgba(20, 24, 30, 0.85);
  --panel-border: #333d4d;
  --text-main: #e2e8f0;
  --text-muted: #64748b;
  --alert: #ef4444;
  --crt-curve: inset 0 0 30px rgba(0,0,0,0.5);
}

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Mono:wght@400;700&display=swap');

/* ============================================================
   2. RESET, GLOBAL STYLES & SCROLLBARS
   ============================================================ */
* { 
  box-sizing: border-box; 
  margin: 0; 
  padding: 0; 
  cursor: crosshair; 
}

body { 
  background-color: var(--bg-core); 
  color: var(--text-main); 
  font-family: var(--font-sans); 
  height: 100vh; 
  overflow: hidden;
  transition: background-color 0.8s ease;
}

::-webkit-scrollbar { 
  width: 6px; 
  height: 6px;
}

::-webkit-scrollbar-track { 
  background: rgba(0,0,0,0.2); 
  border-radius: 3px;
}

::-webkit-scrollbar-thumb { 
  background: var(--panel-border); 
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover { 
  background: var(--accent); 
}

/* ============================================================
   3. ATMOSPHERIC OVERLAYS
   ============================================================ */
#ambient-noise {
  position: fixed; 
  inset: 0; 
  pointer-events: none; 
  z-index: 0;
  background: url('https://grainy-gradients.vercel.app/noise.svg');
  opacity: 0.12; 
  mix-blend-mode: overlay;
}

.scanline {
  position: fixed; 
  inset: 0; 
  pointer-events: none; 
  z-index: 1;
  background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.3) 51%);
  background-size: 100% 4px;
}

#vignette-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 2;
  box-shadow: var(--crt-curve);
  transition: box-shadow 0.8s ease;
}

/* ============================================================
   4. BOOT SEQUENCE
   ============================================================ */
#boot-screen {
  position: fixed;
  inset: 0;
  background-color: #000;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  padding: 60px;
  font-family: var(--font-mono);
  color: var(--accent);
  transition: opacity 1s ease;
}

.boot-line {
  font-size: 12px;
  line-height: 1.6;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.2s ease;
}

/* ============================================================
   5. APP LAYOUT GRID
   ============================================================ */
#app-grid {
  position: relative; 
  z-index: 10; 
  display: grid;
  grid-template-columns: 360px 1fr 420px;
  grid-template-rows: 90px 1fr 220px;
  gap: 25px; 
  padding: 25px; 
  height: 100vh;
  opacity: 0;
  transform: scale(1.02);
  transition: opacity 2s ease, transform 2s ease;
}

.glass-panel {
  background: var(--panel-bg); 
  backdrop-filter: blur(12px); 
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--panel-border); 
  border-radius: 8px;
  display: flex; 
  flex-direction: column; 
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.2);
  transition: border-color 0.4s ease, background 0.4s ease, box-shadow 0.4s ease;
}

.panel-head {
  padding: 15px 25px; 
  border-bottom: 1px solid var(--panel-border);
  display: flex; 
  justify-content: space-between; 
  align-items: center;
  font-family: var(--font-mono); 
  font-size: 11px; 
  font-weight: 700;
  text-transform: uppercase; 
  color: var(--accent); 
  letter-spacing: 2px;
  background: rgba(0,0,0,0.4); 
  transition: color 0.5s ease;
}

/* ============================================================
   6. HEADER & THE TEMPORAL SLIDER
   ============================================================ */
header { 
  grid-column: 1 / span 3; 
  flex-direction: row !important; 
  align-items: center; 
  padding: 0 40px; 
  justify-content: space-between; 
}

.bureau-title { 
  font-family: var(--font-mono); 
  font-size: 1.8rem; 
  font-weight: 700; 
  color: var(--accent); 
  letter-spacing: 6px; 
  transition: color 0.5s ease;
}

.slider-container { 
  display: flex; 
  align-items: center; 
  gap: 20px; 
  background: rgba(0,0,0,0.6); 
  padding: 12px 25px; 
  border-radius: 40px; 
  border: 1px solid var(--panel-border); 
}

.slider-label { 
  font-family: var(--font-mono); 
  font-size: 12px; 
  font-weight: 700; 
  color: var(--text-muted); 
  transition: color 0.3s, text-shadow 0.3s; 
}

.slider-label.active { 
  color: var(--accent); 
  text-shadow: 0 0 12px var(--accent-glow); 
}

input[type=range] {
  -webkit-appearance: none; 
  width: 180px; 
  background: transparent;
}

input[type=range]:focus { 
  outline: none; 
}

input[type=range]::-webkit-slider-runnable-track {
  width: 100%; 
  height: 4px; 
  background: var(--panel-border); 
  border-radius: 2px;
  transition: background 0.5s ease;
}

input[type=range]::-webkit-slider-thumb {
  height: 18px; 
  width: 18px; 
  border-radius: 50%; 
  background: var(--accent);
  cursor: pointer; 
  -webkit-appearance: none; 
  margin-top: -7px;
  box-shadow: 0 0 12px var(--accent-glow); 
  transition: background 0.5s ease, box-shadow 0.5s ease;
}

/* ============================================================
   7. NAVIGATION DIRECTORY (LEFT PANEL)
   ============================================================ */
.nav-scroll { 
  flex: 1; 
  overflow-y: auto; 
  padding: 10px 0; 
}

.nav-item {
  padding: 18px 25px; 
  display: flex; 
  flex-direction: column; 
  gap: 6px;
  border-left: 4px solid transparent; 
  cursor: pointer; 
  transition: all 0.2s ease;
  position: relative;
}

.nav-item:hover { 
  background: rgba(255,255,255,0.03); 
  padding-left: 30px;
}

.nav-item.active { 
  background: rgba(255,255,255,0.06); 
  border-left-color: var(--accent); 
}

.nav-title { 
  font-weight: 600; 
  font-size: 14px; 
  color: var(--text-main); 
  letter-spacing: 1px;
}

.nav-meta { 
  font-family: var(--font-mono); 
  font-size: 10px; 
  color: var(--text-muted); 
  text-transform: uppercase; 
}

.nav-item.active .nav-title { 
  color: var(--accent); 
}

/* ============================================================
   8. VISUAL TELEMETRY & SIGNAL CANVAS (CENTER)
   ============================================================ */
.monitor { 
  grid-column: 2; 
  position: relative; 
  background: #020202; 
  border: 2px solid var(--panel-border); 
}

canvas { 
  width: 100%; 
  height: 100%; 
  opacity: 0.8;
}

.live-indicator { 
  display: flex; 
  align-items: center; 
  gap: 10px; 
  font-family: var(--font-mono); 
  font-size: 11px; 
  color: var(--accent); 
  position: absolute; 
  top: 20px; 
  left: 20px; 
  z-index: 10; 
  letter-spacing: 2px;
}

.dot { 
  width: 8px; 
  height: 8px; 
  background: var(--alert); 
  border-radius: 50%; 
  box-shadow: 0 0 10px var(--alert); 
  animation: blink 1.5s infinite; 
}

@keyframes blink { 
  0%, 100% { opacity: 1; } 
  50% { opacity: 0.2; } 
}

.hud-overlay {
  position: absolute;
  bottom: 20px;
  right: 20px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--accent);
  text-align: right;
  opacity: 0.6;
}

/* ============================================================
   9. SCHEMATIC VIEWER & DATA (RIGHT PANEL)
   ============================================================ */
.svg-stage { 
  flex: 1; 
  display: flex; 
  justify-content: center; 
  align-items: center; 
  padding: 40px; 
  background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%); 
}

svg { 
  width: 90%; 
  height: auto; 
  max-height: 280px; 
  filter: drop-shadow(0 0 15px var(--accent-glow)); 
  transition: all 0.5s ease; 
}

.data-readout { 
  padding: 30px; 
  border-top: 1px solid var(--panel-border); 
  background: rgba(0,0,0,0.5); 
  height: 220px;
  display: flex;
  flex-direction: column;
}

.data-title { 
  font-family: var(--font-mono); 
  font-size: 18px; 
  color: var(--accent); 
  margin-bottom: 12px; 
  text-transform: uppercase; 
  letter-spacing: 2px; 
}

.data-desc { 
  font-size: 13px; 
  line-height: 1.7; 
  color: var(--text-main); 
  flex: 1;
}

.action-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin-top: 15px;
}

.btn {
  background: transparent;
  border: 1px solid var(--panel-border);
  color: var(--text-main);
  padding: 10px;
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  transition: all 0.3s ease;
}

.btn:hover {
  background: var(--accent);
  color: var(--bg-core);
  border-color: var(--accent);
  box-shadow: 0 0 15px var(--accent-glow);
}

/* ============================================================
   10. COMMAND LINE INTERFACE & LOG (FOOTER)
   ============================================================ */
.terminal-footer { 
  grid-column: 1 / span 3; 
  display: grid;
  grid-template-columns: 1fr 400px;
  gap: 30px;
  padding: 0;
}

.log-stream {
  padding: 20px 25px; 
  font-family: var(--font-mono); 
  font-size: 11px; 
  color: var(--text-muted); 
  overflow-y: hidden; 
  display: flex; 
  flex-direction: column-reverse; 
  gap: 6px; 
}

.log-entry { 
  opacity: 0; 
  animation: fadeUp 0.3s forwards; 
}

.log-entry.highlight { 
  color: var(--accent); 
}

.log-entry.error {
  color: var(--alert);
}

@keyframes fadeUp { 
  from { opacity: 0; transform: translateY(8px); } 
  to { opacity: 1; transform: translateY(0); } 
}

.cli-container {
  border-left: 1px solid var(--panel-border);
  padding: 25px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background: rgba(0,0,0,0.3);
}

.cli-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

#cli-input {
  background: rgba(0,0,0,0.5);
  border: 1px solid var(--panel-border);
  color: var(--accent);
  padding: 15px;
  font-family: var(--font-mono);
  font-size: 12px;
  width: 100%;
  transition: all 0.3s ease;
}

#cli-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 10px var(--accent-glow);
}

</style>
</head>
<body data-era="1953">

<div id="ambient-noise"></div>
<div class="scanline"></div>
<div id="vignette-overlay"></div>

<div id="boot-screen">
  <div id="boot-logs"></div>
</div>

<div id="app-grid">
  
  <header class="glass-panel">
    <div class="bureau-title">THE BUREAU</div>
    
    <div class="slider-container">
      <span class="slider-label active" id="lbl-1953">1953</span>
      <input type="range" min="0" max="2" value="0" id="era-slider">
      <span class="slider-label" id="lbl-1986">1986</span>

    <div class="panel-head">
      <span>INDEX</span>

    </div>
    <div class="nav-scroll" id="nav-list">
      </div>
  </aside>

  <main class="glass-panel monitor">
    <div class="live-indicator">
      <div class="dot"></div> 
      VOID_RESONANCE_TRACKER
    </div>
    <div class="hud-overlay" id="hud-stats">
      FLUX: 0.003Hz<br>

      <input type="text" id="cli-input" placeholder="Enter command (e.g. HELP, SCAN)..." autocomplete="off" spellcheck="false">
    </div>
  </footer>

</div>

<script>
/* ============================================================
   1. DATA ARCHIVE (EXPANDED TO 8 ITEMS)
   ============================================================ */
const archive = [
  { 
    id: "apparatus",

            </circle>
            <rect x="40" y="40" width="20" height="20" fill="none" stroke="var(--accent)" stroke-width="1">
              <animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="5s" repeatCount="indefinite"/>
            </rect>
            <path d="M50 0 V100 M0 50 H100" stroke="var(--panel-border)" stroke-width="0.5"/>
          </svg>` 
  },
  { 
    id: "particle", 
    name: "God Particle", 
    class: "Anomaly", 
    desc: "Stable Higgs-field manifestation. Exists simultaneously across 1953, 1986, and 2019. Containment fields are fluctuating at 33Hz.", 
    svg: `<svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="15" fill="var(--accent)">
              <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
              <animate attributeName="r" values="12;16;12" dur="2s" repeatCount="indefinite"/>
            </circle>
            ${Array.from({length:16}).map((_,i)=>`
              <line x1="50" y1="50" x2="${50+Math.cos(i)*35}" y2="${50+Math.sin(i)*35}" stroke="var(--accent)" stroke-width="0.5" opacity="0.5">
                <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="${10 + i}s" repeatCount="indefinite"/>
              </line>
            `).join('')}
          </svg>` 
  },
  { 
    id: "caves", 
    name: "Winden Caves", 
    class: "Geography", 
    desc: "Tri-nodal tunnel system. The iron doors must remain closed to preserve the cycle's integrity. Radiation levels spike near the center.", 
    svg: `<svg viewBox="0 0 100 100">
            <path d="M20 80 Q50 20 80 80" fill="none" stroke="var(--accent)" stroke-width="2"/>
            <path d="M35 80 Q50 50 65 80" fill="none" stroke="var(--accent)" stroke-width="1" opacity="0.5"/>
            <circle cx="50" cy="20" r="3" fill="var(--alert)">
              <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>

    svg: `<svg viewBox="0 0 100 100">
            <path d="M50 20 C65 20 75 35 75 50 C75 65 65 80 50 80 C35 80 25 65 25 50 C25 35 35 20 50 20" fill="none" stroke="var(--accent)" stroke-width="2" stroke-dasharray="4 4"/>
            <circle cx="50" cy="35" r="15" fill="none" stroke="var(--accent)" stroke-width="1"/>
            <circle cx="37" cy="57" r="15" fill="none" stroke="var(--accent)" stroke-width="1"/>
            <circle cx="63" cy="57" r="15" fill="none" stroke="var(--accent)" stroke-width="1"/>
          </svg>` 
  },
  { 
    id: "chair", 
    name: "The Chair", 
    class: "Prototype", 
    desc: "Early displacement prototype located in the bunker. Energy amplification destroys the subject's ocular nerves. Morally compromised.", 
    svg: `<svg viewBox="0 0 100 100">
            <rect x="35" y="40" width="30" height="10" fill="none" stroke="var(--accent)" stroke-width="1"/>
            <line x1="35" y1="50" x2="35" y2="80" stroke="var(--accent)" stroke-width="1"/>

            <path d="M35 40 Q50 20 65 40" fill="none" stroke="var(--accent)" stroke-width="1"/>
            <circle cx="50" cy="25" r="8" fill="none" stroke="var(--accent)" stroke-width="1"/>
            <line x1="10" y1="35" x2="90" y2="35" stroke="var(--alert)" stroke-width="0.5"/>

  },
  {

            <polygon points="50,15 85,35 85,75 50,95 15,75 15,35" fill="none" stroke="var(--accent)" stroke-width="1"/>
            <polygon points="50,30 70,42 70,66 50,78 30,66 30,42" fill="none" stroke="var(--accent)" stroke-width="0.5" stroke-dasharray="2 2"/>
            <circle cx="50" cy="54" r="5" fill="var(--accent)">
               <animate attributeName="r" values="4;7;4" dur="0.5s" repeatCount="indefinite"/>

  {

            <circle cx="65" cy="50" r="4" fill="var(--accent)"/>

/* ============================================================
   2. AUDIO ENGINE (WEB AUDIO API)
   ============================================================ */
let audioCtx;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  // Ambient Hum
  const hum = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  hum.type = 'sine';
  hum.frequency.setValueAtTime(45, audioCtx.currentTime); // Low freq hum
  gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
  hum.connect(gain);
  gain.connect(audioCtx.destination);
  hum.start();
}

function playKeystroke() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(800 + Math.random()*200, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
  gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.05);
}

function playAlert() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(220, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.3);
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.3);
}

document.body.addEventListener('click', initAudio, { once: true });

/* ============================================================
   3. BOOT SEQUENCE
   ============================================================ */
const bootScreen = document.getElementById('boot-screen');
const bootLogs = document.getElementById('boot-logs');
const appGrid = document.getElementById('app-grid');

const startupSequence = [
  "INITIALIZING BUREAU MAINFRAME...",
  "CHECKING VACUUM TUBE ARRAYS [OK]",
  "MOUNTING MAGNETIC TAPE DRIVES...",
  "SYNCING TO TEMPORAL NODE 1953...",
  "DECRYPTING LEVEL 5 CLEARANCE FILES...",
  "ESTABLISHING SECURE CONNECTION...",
  "WELCOME, OPERATOR."
];

function runBootSequence() {
  let delay = 0;
  
  startupSequence.forEach((text, index) => {
    setTimeout(() => {
      const line = document.createElement('div');
      line.className = 'boot-line';
      line.innerText = `> ${text}`;
      bootLogs.appendChild(line);
      
      // Trigger animation
      setTimeout(() => {
        line.style.opacity = '1';
        line.style.transform = 'translateY(0)';
        if(audioCtx) playKeystroke();
      }, 50);

    }, delay);
    
    delay += 400 + Math.random() * 300;
  });

  // Fade out boot screen and show app
  setTimeout(() => {
    bootScreen.style.opacity = '0';
    appGrid.style.opacity = '1';
    appGrid.style.transform = 'scale(1)';
    
    setTimeout(() => {
      bootScreen.remove();
      addLog("SYSTEM BOOT COMPLETE. AWAITING INPUT.", true);
    }, 1000);
    
  }, delay + 500);
}

/* ============================================================
   4. UI LOGIC & TYPEWRITER EFFECT
   ============================================================ */
const navList = document.getElementById('nav-list');
const logStream = document.getElementById('log-stream');
let typeTimeout;

function addLog(msg, highlight = false, error = false) {
  const div = document.createElement('div');
  
  let className = 'log-entry';
  if(highlight) className += ' highlight';
  if(error) className += ' error';
  
  div.className = className;
  div.innerText = `> [${new Date().toLocaleTimeString()}] ${msg}`;
  
  logStream.prepend(div);
  
  if(logStream.children.length > 12) {
    logStream.lastChild.remove();
  }
}

function typeWriter(text, elementId, speed = 15) {
  const el = document.getElementById(elementId);
  el.innerHTML = '';
  let i = 0;
  clearTimeout(typeTimeout);
  
  function type() {
    if (i < text.length) {
      el.innerHTML += text.charAt(i);
      i++;
      if(i % 3 === 0 && audioCtx) playKeystroke(); // Play sound every 3 chars
      typeTimeout = setTimeout(type, speed);
    }
  }
  type();
}

function selectProject(p) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`nav-${p.id}`).classList.add('active');
  
  document.getElementById('svg-stage').innerHTML = p.svg;
  document.getElementById('obj-title').innerText = p.name;
  document.getElementById('obj-id-tag').innerText = `ID_${p.id.substring(0,3).toUpperCase()}`;
  
  typeWriter(p.desc, 'obj-desc');
  
  addLog(`ACCESSED RECORD: ${p.id.toUpperCase()}`);
}

// Populate Navigation
archive.forEach(p => {
  const div = document.createElement('div');
  div.className = 'nav-item';
  div.id = `nav-${p.id}`;
  div.innerHTML = `
    <span class="nav-title">${p.name}</span>
    <span class="nav-meta">${p.class}</span>
  `;
  div.onclick = () => {
    if(audioCtx) playKeystroke();
    selectProject(p);
  };
  navList.appendChild(div);
});

/* ============================================================
   5. THE ERA SLIDER (THEME ENGINE)
   ============================================================ */
const slider = document.getElementById('era-slider');
const eras = ["1953", "1986", "2019"];

slider.addEventListener('input', (e) => {
  const val = e.target.value;
  const currentEra = eras[val];
  
  document.body.setAttribute('data-era', currentEra);
  
  document.querySelectorAll('.slider-label').forEach(el => el.classList.remove('active'));
  document.getElementById(`lbl-${currentEra}`).classList.add('active');
  
  playAlert();
  addLog(`TEMPORAL SHIFT INITIATED: SYNCING PROTOCOLS TO ${currentEra}...`, true);
  
  // Update HUD text based on era
  const syncStatus = document.getElementById('sync-status');
  if(currentEra === "1953") syncStatus.innerText = "STABLE";
  if(currentEra === "1986") syncStatus.innerText = "FLUCTUATING";
  if(currentEra === "2019") syncStatus.innerText = "CRITICAL";
});

/* ============================================================
   6. CANVAS TELEMETRY & RADAR
   ============================================================ */
const canvas = document.getElementById('telemetryCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() { 
  canvas.width = canvas.offsetWidth; 
  canvas.height = canvas.offsetHeight; 
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function drawCanvas(time) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  const computedStyle = getComputedStyle(document.body);
  const accentColor = computedStyle.getPropertyValue('--accent').trim();
  const alertColor = computedStyle.getPropertyValue('--alert').trim();
  
  const complexity = parseInt(slider.value) + 1; // 1, 2, or 3 based on era
  
  // 1. Draw Background Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for(let i=0; i<canvas.width; i+=40) { 
    ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); 
  }
  for(let i=0; i<canvas.height; i+=40) { 
    ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); 
  }

  // 2. Draw Waveform (Amplitude changes with era)
  ctx.beginPath();
  ctx.strokeStyle = accentColor;
  ctx.lineWidth = 2;
  
  for(let x = 0; x < canvas.width; x += 4) {
    const baseSine = Math.sin(x*0.02 + time*0.002);
    const complexSine = Math.cos(x*0.05 + time*0.005);
    const y = canvas.height/2 + (baseSine * 20 * complexity) + (complexSine * 10 * complexity);
    ctx.lineTo(x, y);
  }
  ctx.stroke();

  // 3. Draw Radar Sweep Line
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const radius = Math.min(cx, cy) - 20;
  
  ctx.beginPath();
  ctx.strokeStyle = `rgba(255,255,255,0.1)`;
  ctx.lineWidth = 1;
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.stroke();
  
  const sweepAngle = (time * 0.001) % (Math.PI * 2);
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(sweepAngle) * radius, cy + Math.sin(sweepAngle) * radius);
  ctx.strokeStyle = alertColor;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Update HUD Data randomly
  if(Math.random() > 0.95) {
    const flux = (0.003 + Math.random()*0.002).toFixed(4);
    const amp = (40 + Math.random()*10 * complexity).toFixed(1);
    const rad = (0.02 * complexity + Math.random()*0.01).toFixed(3);
    document.getElementById('hud-stats').innerHTML = `FLUX: ${flux}Hz<br>AMP: ${amp}V<br>RAD: ${rad}μSv/h`;
  }

  requestAnimationFrame(drawCanvas);
}

/* ============================================================
   7. COMMAND LINE INTERFACE (CLI)
   ============================================================ */
const cliInput = document.getElementById('cli-input');

function executeCommand(cmd) {
  addLog(`EXECUTING: ${cmd.toUpperCase()}`, true);
  
  if(cmd === 'OVERRIDE') {
    playAlert();
    document.body.style.filter = "invert(1) hue-rotate(180deg)";
    setTimeout(() => {
      document.body.style.filter = "none";
    }, 200);
    addLog("SECURITY OVERRIDE FAILED. O5 CLEARANCE REQUIRED.", false, true);
  } else if (cmd === 'DECRYPT') {
    addLog("DECRYPTING PACKETS... [OK]");
  }
}

cliInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter') {
    const val = cliInput.value.trim().toUpperCase();
    if(val === '') return;
    
    playKeystroke();
    addLog(`USER_INPUT: ${val}`);
    
    switch(val) {
      case 'HELP':
        addLog("AVAILABLE COMMANDS: SCAN, OVERRIDE, CLEAR, REBOOT, STATUS");
        break;
      case 'CLEAR':
        logStream.innerHTML = '';
        break;
      case 'REBOOT':
        addLog("INITIATING SYSTEM REBOOT...", true);
        setTimeout(() => window.location.reload(), 1000);
        break;
      case 'SCAN':
        addLog("SCANNING LOCAL AREA FOR ANOMALIES...");
        setTimeout(() => addLog("RESULT: 1 TEMPORAL ANOMALY DETECTED.", false, true), 1500);
        break;
      case 'STATUS':
        addLog(`CURRENT ERA: ${eras[slider.value]} | INTEGRITY: NOMINAL`);
        break;
      case 'OVERRIDE':
        executeCommand('OVERRIDE');
        break;
      default:
        addLog(`COMMAND NOT RECOGNIZED: '${val}'`, false, true);
    }
    
    cliInput.value = '';
  }
});

/* ============================================================
   8. CLOCK & INITIALIZATION
   ============================================================ */
setInterval(() => {
  document.getElementById('clock').innerText = new Date().toLocaleTimeString();
}, 1000);

// Start
window.onload = () => {
  runBootSequence();
  selectProject(archive[0]);
  requestAnimationFrame(drawCanvas);
};

</script>
