<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>THE BUREAU // SIC MUNDUS ARCHIVE — STATION_7</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
:root {
  --accent: #d4af37;
  --accent-muted: #4a3728;
  --bg: #0a0a09;
  --panel: #11100e;
  --rust: #3d2b1f;
  --alert: #8b0000;
  --crt-glow: 0 0 12px rgba(212, 175, 55, 0.25);
}

@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

/* RESET & BASE */
* { box-sizing: border-box; cursor: crosshair; }
body { 
  margin: 0; background: var(--bg); color: #8e8a7d; 
  font-family: 'Space Mono', monospace; overflow: hidden;
  height: 100vh; text-transform: uppercase; font-size: 10px;
}

/* CRT & ATMOSPHERE */
#grain {
  position: fixed; inset: 0; pointer-events: none; z-index: 5000;
  background: url('https://grainy-gradients.vercel.app/noise.svg');
  opacity: 0.12; filter: contrast(180%);
}
body::after {
  content: " "; display: block; position: absolute; inset: 0;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
              linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.04));
  z-index: 4000; pointer-events: none; background-size: 100% 3px, 3px 100%;
}

/* BOOT SYSTEM */
#boot-wrap {
  position: fixed; inset: 0; background: #000; z-index: 9999;
  padding: 50px; color: var(--accent); display: flex; flex-direction: column;
}
.boot-line { margin-bottom: 5px; visibility: hidden; }

/* LAYOUT ENGINE */
.app-container {
  display: grid;
  grid-template-columns: 340px 1fr 400px;
  grid-template-rows: 60px 1fr 160px;
  height: 100vh; gap: 15px; padding: 15px;
  opacity: 0; transition: opacity 2s ease;
}

.top-bar { grid-column: 1 / span 3; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--rust); background: var(--panel); padding: 0 20px; }
.panel { background: var(--panel); border: 1px solid var(--rust); position: relative; display: flex; flex-direction: column; overflow: hidden; }
.panel-header { padding: 8px 15px; background: var(--rust); color: var(--accent); font-weight: bold; font-size: 9px; letter-spacing: 2px; display: flex; justify-content: space-between; align-items: center; }

/* HUD & INTERFACE */
#hud-pos { position: fixed; pointer-events: none; z-index: 6000; font-size: 8px; color: var(--accent); white-space: nowrap; text-shadow: var(--crt-glow); }

.nav-scroll { flex: 1; overflow-y: auto; }
.nav-item {
  padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.02);
  transition: 0.2s; cursor: pointer; display: flex; justify-content: space-between;
}
.nav-item:hover { background: rgba(212, 175, 55, 0.05); }
.nav-item.active { background: rgba(212, 175, 55, 0.12); border-left: 4px solid var(--accent); color: #fff; }

/* MONITOR VIEW */
.main-monitor { grid-column: 2; background: #040403; border-radius: 4px; box-shadow: inset 0 0 40px #000; }
canvas { width: 100%; height: 100%; filter: sepia(0.3) contrast(1.1); }

/* SCHEMATIC VIEW */
.schematic-box { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; background: radial-gradient(circle, #151412 0%, #0d0c0a 100%); }
svg { width: 100%; height: auto; max-height: 280px; filter: drop-shadow(var(--crt-glow)); }

/* LOGS */
.terminal-footer { 
  grid-column: 1 / span 3; background: #070706; 
  padding: 15px; border: 1px solid var(--rust); 
  display: grid; grid-template-columns: 1fr 300px; gap: 20px;
}
#log-stream { overflow: hidden; line-height: 1.6; color: var(--accent); }

/* SCROLLBARS */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--rust); }

/* ERA SELECTOR */
.era-btn { 
  background: transparent; border: 1px solid var(--accent-muted); color: var(--accent-muted);
  padding: 4px 10px; font-family: inherit; font-size: 9px; margin-left: 5px; transition: 0.3s;
}
.era-btn.active { border-color: var(--accent); color: var(--accent); box-shadow: var(--crt-glow); }

@keyframes flicker { 0% { opacity: 0.99; } 5% { opacity: 0.95; } 10% { opacity: 0.99; } 100% { opacity: 1; } }
.app-container { animation: flicker 0.15s infinite; }
</style>
</head>
<body>

<div id="grain"></div>
<div id="boot-wrap"></div>
<div id="hud-pos">X:000 Y:000</div>

<div class="app-container" id="main-ui">
  <header class="top-bar">
    <div style="display: flex; align-items: center;">
      <div style="color: var(--accent); font-weight: 700; font-size: 1.2rem; letter-spacing: 2px;">THE BUREAU</div>
      <div style="margin-left: 30px; opacity: 0.4;">STATION: MORNINGTON_TAS</div>
    </div>
    <div id="era-nav">
      <button class="era-btn active">1953</button>
      <button class="era-btn">1986</button>
      <button class="era-btn">2019</button>
    </div>
    <div id="clock" style="color: var(--accent); letter-spacing: 3px;">00:00:00</div>
  </header>

  <aside class="panel">
    <div class="panel-header"><span>PROJECT_INDEX</span><span>V.99</span></div>
    <div class="nav-scroll" id="nav-list"></div>
    <div style="padding: 15px; border-top: 1px solid var(--rust); font-size: 9px;">
      <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
        <span>VOID_SYNC:</span><span id="void-val" style="color:var(--accent)">0.00%</span>
      </div>
      <div style="height:2px; background:var(--accent-muted); width:100%;"><div id="void-bar" style="height:100%; background:var(--accent); width:0%;"></div></div>
    </div>
  </aside>

  <main class="panel main-monitor">
    <div class="panel-header"><span><span style="color:red">●</span> LIVE_TELEMETRY</span><span id="sig-id">SIG_77</span></div>
    <canvas id="telemetryCanvas"></canvas>
  </main>

  <aside class="panel">
    <div class="panel-header">OBJECT_SCHEMATICS</div>
    <div class="schematic-box" id="svg-stage"></div>
    <div style="padding: 20px; border-top: 1px solid var(--rust);">
      <h3 id="obj-title" style="margin: 0 0 10px 0; color: var(--accent);">--</h3>
      <p id="obj-desc" style="font-size: 9px; line-height: 1.6; opacity: 0.6; min-height: 60px;"></p>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button onclick="triggerGlitch()" class="era-btn active" style="margin:0; width:100%; padding:10px;">DECRYPT</button>
        <button class="era-btn active" style="margin:0; width:100%; padding:10px; background:var(--accent); color:var(--bg);">ARCHIVE</button>
      </div>
    </div>
  </aside>

  <footer class="terminal-footer">
    <div id="log-stream"></div>
    <div style="border-left: 1px solid var(--rust); padding-left: 20px;">
      <div style="font-size: 8px; opacity: 0.5; margin-bottom: 5px;">SYSTEM_DIAGNOSTICS:</div>
      <div id="diag-bars"></div>
    </div>
  </footer>
</div>

<script>
const archive = [
  { id: "app-33", name: "The Apparatus", desc: "Dual-layer brass machine capable of temporal displacement. Missing radioactive core.", 
    svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="var(--accent)" stroke-width="0.5"/><g><circle cx="50" cy="50" r="30" fill="none" stroke="var(--accent)" stroke-width="1" stroke-dasharray="5 5"><animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="15s" repeatCount="indefinite"/></circle></g><path d="M50 5 V95 M5 50 H95" stroke="var(--accent)" stroke-width="0.2" opacity="0.3"/><rect x="40" y="40" width="20" height="20" fill="none" stroke="var(--accent)" stroke-width="0.5"><animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="5s" repeatCount="indefinite"/></rect></svg>` },
  { id: "god-p", name: "God Particle", desc: "A stable Cesium isotope stabilized within a magnetic field. Caution: Highly radioactive.", 
    svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="10" fill="var(--accent)"><animate attributeName="r" values="8;14;8" dur="0.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0.4;1" dur="0.8s" repeatCount="indefinite"/></circle>${Array.from({length:12}).map((_,i)=>`<line x1="50" y1="50" x2="${50+Math.cos(i)*40}" y2="${50+Math.sin(i)*40}" stroke="var(--accent)" stroke-width="0.2" opacity="0.3"/>`).join('')}</svg>` },
  { id: "tunnel", name: "Cave Passage", desc: "Natural cave system beneath Winden. 1953 entry point verified. 33-year cycle oscillation.", 
    svg: `<svg viewBox="0 0 100 100"><path d="M10 80 Q50 10 90 80" fill="none" stroke="var(--accent)" stroke-width="1"><animate attributeName="d" values="M10 80 Q50 10 90 80; M10 80 Q50 50 90 80; M10 80 Q50 10 90 80" dur="4s" repeatCount="indefinite"/></path><path d="M30 80 Q50 40 70 80" fill="none" stroke="var(--accent)" stroke-width="0.5" opacity="0.5"/></svg>` },
  { id: "emerald", name: "Emerald Tablet", desc: "Hermetic text found on site. 'Sic Mundus Creatus Est'. Origins unknown.", 
    svg: `<svg viewBox="0 0 100 100"><rect x="20" y="20" width="60" height="60" fill="none" stroke="var(--accent)" stroke-width="0.5"/><path d="M30 30 L70 70 M70 30 L30 70" stroke="var(--accent)" stroke-width="0.3"/><path d="M50 20 V80 M20 50 H80" stroke="var(--accent)" stroke-width="0.2" stroke-dasharray="2"/></svg>` },
  { id: "notebook", name: "The Notebook", desc: "Contains calculations for the 33-year cycle. Pages 1-251 missing. Author: Unknown.", 
    svg: `<svg viewBox="0 0 100 100"><rect x="30" y="20" width="40" height="60" fill="none" stroke="var(--accent)" stroke-width="1"/><line x1="35" y1="30" x2="65" y2="30" stroke="var(--accent)" stroke-width="0.5"/><line x1="35" y1="40" x2="65" y2="40" stroke="var(--accent)" stroke-width="0.5"/><line x1="35" y1="50" x2="55" y2="50" stroke="var(--accent)" stroke-width="0.5"/></svg>` },
  { id: "power", name: "Plant Schematic", desc: "Winden Nuclear Power Plant cooling system. High probability of core melt in 1986 event.", 
    svg: `<svg viewBox="0 0 100 100"><rect x="10" y="60" width="80" height="30" fill="none" stroke="var(--accent)" stroke-width="1"/><path d="M30 60 V30 Q50 10 70 30 V60" fill="none" stroke="var(--accent)" stroke-width="1"/></svg>` }
];

// BOOT ENGINE
const bootLines = ["WINDEN_SYSTEM_LOAD_V99", "MOUNTING_LOCAL_ARCHIVE...", "CHECKING_TEMPORAL_COHESION...", "RESTORING_1953_RECORDS...", "ACCESS_GRANTED_O5", "READY."];
const bootWrap = document.getElementById('boot-wrap');
bootLines.forEach((text, i) => {
  const d = document.createElement('div');
  d.className = 'boot-line';
  d.innerText = `> ${text}`;
  bootWrap.appendChild(d);
  setTimeout(() => d.style.visibility = 'visible', i * 400);
});
setTimeout(() => {
  bootWrap.style.opacity = '0';
  document.getElementById('main-ui').style.opacity = '1';
  setTimeout(() => bootWrap.remove(), 2000);
}, 3000);

// UI CONTROLLER
const nav = document.getElementById('nav-list');
const stage = document.getElementById('svg-stage');
const stream = document.getElementById('log-stream');

function select(p) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`nav-${p.id}`).classList.add('active');
  document.getElementById('obj-title').innerText = p.name;
  document.getElementById('obj-desc').innerText = p.desc;
  stage.innerHTML = p.svg;
  pushLog(`ACCESSING_FILE: ${p.id.toUpperCase()} ... [OK]`);
}

archive.forEach(p => {
  const div = document.createElement('div');
  div.id = `nav-${p.id}`;
  div.className = 'nav-item';
  div.innerHTML = `<span>${p.name}</span><span style="opacity:0.3">ID_${Math.floor(Math.random()*999)}</span>`;
  div.onclick = () => select(p);
  nav.appendChild(div);
});

function pushLog(msg) {
  const div = document.createElement('div');
  div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
  stream.prepend(div);
  if(stream.childNodes.length > 7) stream.lastChild.remove();
}

// HUD COORDINATES
window.onmousemove = (e) => {
  const hud = document.getElementById('hud-pos');
  hud.style.left = (e.clientX + 15) + 'px';
  hud.style.top = (e.clientY + 15) + 'px';
  hud.innerText = `LNX:${e.clientX} LNY:${e.clientY}`;
};

// TELEMETRY CANVAS
const canvas = document.getElementById('telemetryCanvas');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
window.onresize = resize; resize();

function drawTelemetry(t) {
  ctx.fillStyle = 'rgba(10, 10, 9, 0.2)';
  ctx.fillRect(0,0,canvas.width, canvas.height);
  
  // Grid Lines
  ctx.strokeStyle = 'rgba(212, 175, 55, 0.05)';
  for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
  for(let j=0; j<canvas.height; j+=50) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(canvas.width,j); ctx.stroke(); }

  // Sin Waves
  ctx.beginPath(); ctx.strokeStyle = 'var(--accent)'; ctx.lineWidth = 1;
  for(let x=0; x<canvas.width; x+=2) {
    const y = canvas.height/2 + Math.sin(x*0.01 + t*0.002) * 30 + Math.sin(x*0.05 + t*0.005) * 10;
    ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Noise
  for(let i=0; i<20; i++) {
    ctx.fillStyle = `rgba(212, 175, 55, ${Math.random()*0.3})`;
    ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 1);
  }
  requestAnimationFrame(drawTelemetry);
}
drawTelemetry(0);

// DIAGNOSTICS & SYSTEM CLOCK
setInterval(() => {
  document.getElementById('clock').innerText = new Date().toLocaleTimeString();
  const v = (Math.random()*100).toFixed(2);
  document.getElementById('void-val').innerText = `${v}%`;
  document.getElementById('void-bar').style.width = `${v}%`;
  
  if(Math.random() > 0.9) pushLog("WARNING: SIGNAL_INTERFERENCE_DETECTED");
}, 1000);

// DIAGNOSTIC BARS
const diag = document.getElementById('diag-bars');
for(let i=0; i<4; i++) {
  const b = document.createElement('div');
  b.style = "height:4px; background:var(--accent-muted); margin-bottom:5px; width:100%";
  const inner = document.createElement('div');
  inner.style = `height:100%; background:var(--accent); width:${40 + Math.random()*50}%`;
  b.appendChild(inner);
  diag.appendChild(b);
}

function triggerGlitch() {
  document.body.style.filter = "invert(1) hue-rotate(180deg)";
  setTimeout(() => document.body.style.filter = "none", 150);
  pushLog("CRITICAL: DATA_CORRUPTION_PREVENTED");
}

select(archive[0]);
</script>
</body>
</html>
