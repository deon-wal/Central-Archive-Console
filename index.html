<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>THE BUREAU // SIC MUNDUS ARCHIVE — Winden 1953</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
:root{
  --accent:#bfa16a;
  --bg:#0d0c0a;
  --panel:rgba(12,10,8,0.98);
  --rust:#5c2e1a;
  --muted:#bfb3a0;
  --glass: rgba(255,255,255,0.03);
  --highlight: rgba(191, 161, 106, 0.12);
}

/* Scrollbar Styling */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--rust); border-radius: 2px; }

*{box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--bg);font-family:"Courier New",monospace;color:var(--muted);cursor:crosshair; overflow: hidden;}
a{color:inherit;text-decoration:none}

/* film grain + overlays */
#grain{
  position:fixed;inset:0;pointer-events:none;
  background:url('https://grainy-gradients.vercel.app/noise.svg');
  filter: contrast(150%) brightness(100%);
  opacity:0.12;z-index:30;
}
#flicker{position:fixed;inset:0;pointer-events:none;z-index:25;opacity:0.06;background:linear-gradient(transparent, rgba(0,0,0,0.1));animation:lampFlicker 8s infinite}
@keyframes lampFlicker{
  0%{opacity:.02} 5%{opacity:.15} 7%{opacity:.02} 9%{opacity:.1} 20%{opacity:.04} 100%{opacity:.03}
}

/* frame */
.app { display:flex; height:100vh; padding:20px; gap:20px; }
.console-frame {
  flex:1;
  border-radius:24px;
  border:1px solid #222;
  background:var(--panel);
  display:grid;
  grid-template-columns:320px 1fr;
  overflow:hidden;
  box-shadow: 0 0 100px rgba(0,0,0,1);
}

/* sidebar */
.sidebar{padding:28px;border-right:1px solid var(--rust);display:flex;flex-direction:column;gap:20px; background: rgba(0,0,0,0.2);}
.logo{font-size:1.1rem;color:var(--accent);letter-spacing:5px; font-weight: bold;}
.id{font-size:.6rem;opacity:.4; letter-spacing: 2px;}
.era-selector{border-left: 2px solid var(--accent); padding-left: 15px; margin: 10px 0;}
.era-btn{display:block;background:transparent;border:0;color:var(--accent);text-align:left;padding:8px 0;font-size:.8rem;opacity:.9;}
.notes{flex:1;font-size:.7rem;line-height:2;opacity:.5; border-top: 1px dashed rgba(255,255,255,0.05); padding-top: 20px;}

/* main view */
.main-view{position:relative;padding:34px;overflow:auto; }
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;border-bottom:1px solid rgba(191, 161, 106, 0.1);padding-bottom:15px}

/* Glitch Animation */
.glitch { position: relative; color: var(--accent); font-weight: 700; animation: textGlitch 4s infinite; }
@keyframes textGlitch {
  0%, 90%, 100% { transform: translate(0); opacity: 1; }
  92% { transform: translate(-2px, 1px); opacity: 0.8; }
  94% { transform: translate(2px, -1px); opacity: 0.8; color: #fff; }
  96% { transform: translate(-1px, -2px); }
}

/* content grid */
.content-grid{display:grid;grid-template-columns:1fr 340px;gap:25px;}

/* Panels */
.live-panel{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.03);padding:15px;border-radius:4px;}
.live-canvas{background:#050505;border:1px solid var(--rust);position:relative; overflow: hidden;}
.project-card{
  background:rgba(255,255,255,0.01); border:1px solid rgba(255,255,255,0.03);
  padding:15px; margin-bottom: 10px; transition: 0.3s; cursor: pointer;
}
.project-card:hover { background: var(--highlight); border-color: var(--accent); }
.project-card.active { background: var(--highlight); border-left: 4px solid var(--accent); }
.project-card h3 { margin: 0; font-size: 0.9rem; color: var(--accent); }
.project-card p { margin: 5px 0 0; font-size: 0.75rem; opacity: 0.6; }

/* Detail Panel */
.detail-panel{ background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.03); padding: 20px; border-radius: 4px;}
.svc-image{ margin-top: 15px; border: 1px solid rgba(191, 161, 106, 0.2); background: #000; transition: 0.3s;}
.svc-image:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(191, 161, 106, 0.1); }

/* Buttons */
.cam-btn, .close-btn {
  background: transparent; border: 1px solid var(--rust); color: var(--muted);
  font-family: inherit; font-size: 0.6rem; padding: 4px 10px; cursor: pointer;
}
.cam-btn:hover { background: var(--rust); color: #fff; }

/* HUD */
.hud-corner{position:absolute;right:38px;bottom:30px;width:250px; font-size:.65rem; color:var(--accent); pointer-events: none;}
.signal-item{ opacity: 0.5; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.02);}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;visibility:hidden;transition:0.3s;}
.modal.open{opacity:1;visibility:visible;}
.modal-content{width:90%; max-width:1000px; background:var(--panel); border:1px solid var(--accent); padding:30px;}

#clock { color: var(--accent); letter-spacing: 2px; }
</style>
</head>
<body>
  <div id="grain"></div>
  <div id="flicker"></div>

  <div class="app">
    <div class="console-frame">
      <aside class="sidebar">
        <div class="id">EST_WINDEN_1953</div>
        <div class="logo">THE BUREAU</div>
        <div class="era-selector">
          <div style="font-size:.6rem; opacity:.5; margin-bottom:5px">TEMPORAL_FOCUS</div>
          <button class="era-btn">CYCLE_01 // 1953</button>
        </div>
        <div class="notes">
          > Sic mundus creatus est.<br>
          > The end is the beginning.<br>
          > Accessing local archive...
        </div>
        <div id="clock">00:00:00</div>
      </aside>

      <main class="main-view">
        <div class="header">
          <div class="status glitch">ARCHIVE_LINK: STABLE</div>
          <div style="font-size:.7rem; opacity:.4">STATION: MORNINGTON_TAS</div>
        </div>

        <div class="content-grid">
          <section>
            <div class="live-panel">
              <div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;">
                <span style="font-size:.7rem;"><span style="color:red">●</span> LIVE_FEED: CAM_03</span>
                <button class="cam-btn" id="cam-toggle">TOGGLE_MODE</button>
              </div>
              <div class="live-canvas" style="height:250px">
                <canvas id="liveFeed"></canvas>
              </div>
            </div>

            <div style="margin-top:25px">
              <div style="font-size:.7rem; color:var(--accent); margin-bottom:10px; letter-spacing:2px">DATA_REPOSITORY</div>
              <div id="project-list"></div>
            </div>
          </section>

          <aside class="detail-panel">
            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
              <h4 id="detail-name" style="margin:0; color:var(--accent)">-</h4>
              <button class="cam-btn" id="view-large">EXPAND</button>
            </div>
            <p id="detail-desc" style="font-size:.75rem; line-height:1.6; min-height:60px"></p>
            <div class="svc-image" id="svc-image"></div>
            
            <div style="margin-top:20px; font-size:.65rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top:15px">
              <div>AUTH_LEVEL: <span style="color:var(--accent)">O5_CLEARANCE</span></div>
              <div style="margin-top:5px">LAST_MOD: <span id="last-sync">--</span></div>
            </div>
          </aside>
        </div>

        <div class="hud-corner">
          <div style="opacity:.3; margin-bottom:10px">SYSTEM_TRAFFIC:</div>
          <div id="signal-log"></div>
        </div>
      </main>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <span id="modal-title" style="color:var(--accent)"></span>
        <button class="cam-btn" onclick="closeModal()">CLOSE_X</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

<script>
/* ==========================================
   ANIMATED SVC GENERATOR
   ========================================== */
function svcSVG(type) {
  const colors = { line: "#d7c8a2", accent: "#bfa16a" };
  
  // Base SVG structure with internal CSS for animations
  let content = '';
  
  if(type === 'substrate') {
    content = `
      <style>
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
        .spin { transform-origin: center; animation: rotate 20s linear infinite; }
        .pulse { animation: pulse 4s ease-in-out infinite; }
      </style>
      <circle cx="400" cy="210" r="150" stroke="${colors.line}" stroke-width="1" fill="none" stroke-dasharray="10 5" class="spin"/>
      <circle cx="400" cy="210" r="80" stroke="${colors.accent}" stroke-width="2" fill="none" class="pulse"/>
      <path d="M250 210 L550 210 M400 60 L400 360" stroke="${colors.line}" stroke-width="0.5" opacity="0.3"/>
      <rect x="300" y="160" width="200" height="100" stroke="${colors.line}" fill="none" stroke-width="1"/>
    `;
  } else if (type === 'harrow') {
    content = `
      <style>
        @keyframes flow { to { stroke-dashoffset: -20; } }
        .flow { stroke-dasharray: 5 5; animation: flow 1s linear infinite; }
      </style>
      <path d="M100 100 L700 100 L700 300 L100 300 Z" stroke="${colors.line}" fill="none" />
      <path d="M100 150 L700 150 M100 200 L700 200 M100 250 L700 250" stroke="${colors.line}" opacity="0.2" />
      <circle cx="150" cy="100" r="4" fill="${colors.accent}"/>
      <path d="M150 100 V300" stroke="${colors.accent}" class="flow" />
    `;
  } else {
    content = `
      <style>
        @keyframes jitter { 0% { transform: scaleY(1); } 50% { transform: scaleY(1.5); } 100% { transform: scaleY(1); } }
        .bar { animation: jitter 0.5s infinite; transform-origin: bottom; }
      </style>
      <line x1="100" y1="350" x2="700" y2="350" stroke="${colors.line}" />
      ${Array.from({length: 12}).map((_, i) => `
        <rect class="bar" x="${150 + i*45}" y="${350 - (Math.random()*150 + 50)}" width="20" height="200" fill="${colors.accent}" opacity="0.6" style="animation-delay: ${i*0.1}s" />
      `).join('')}
    `;
  }

  return `<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
    <rect width="100%" height="100%" fill="#050505"/>
    <g opacity="0.8">${content}</g>
  </svg>`;
}

const projects = [
  { id: "substrate", name: "Substrate Protocol", desc: "A recursive architecture for visual telemetry. Deep-layer data mapping.", type: 'substrate' },
  { id: "harrow", name: "Harrow OS", desc: "Logic gate diagram detailing heavy hardware architecture and routing.", type: 'harrow' },
  { id: "anomaly", name: "Anomaly Observatory", desc: "Live monitoring of seismic and solar collapse. Everything is connected.", type: 'anomaly' }
];

let currentProject = projects[0];

function render() {
  const list = document.getElementById('project-list');
  list.innerHTML = projects.map(p => `
    <div class="project-card ${p.id === currentProject.id ? 'active' : ''}" onclick="selectProject('${p.id}')">
      <h3>${p.name}</h3>
      <p>${p.desc}</p>
    </div>
  `).join('');

  document.getElementById('detail-name').innerText = currentProject.name;
  document.getElementById('detail-desc').innerText = currentProject.desc;
  document.getElementById('svc-image').innerHTML = svcSVG(currentProject.type);
  document.getElementById('last-sync').innerText = new Date().toLocaleTimeString();
}

window.selectProject = (id) => {
  currentProject = projects.find(p => p.id === id);
  render();
};

/* ==========================================
   CANVAS LIVE FEED
   ========================================== */
const canvas = document.getElementById('liveFeed');
const ctx = canvas.getContext('2d');
let mode = 'optical';

function resize() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
window.addEventListener('resize', resize);
resize();

function draw(t) {
  ctx.fillStyle = mode === 'optical' ? '#050505' : '#0a1a0a';
  ctx.fillRect(0,0,canvas.width, canvas.height);
  
  // Static noise
  for(let i=0; i<1000; i++) {
    ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.05})`;
    ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 1);
  }

  // Moving subject
  const x = canvas.width/2 + Math.sin(t/1000)*50;
  const y = canvas.height/2 + Math.cos(t/1500)*20;
  ctx.fillStyle = mode === 'optical' ? 'rgba(255,255,255,0.05)' : 'rgba(0,255,0,0.2)';
  ctx.beginPath();
  ctx.arc(x, y, 40, 0, Math.PI*2);
  ctx.fill();

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

document.getElementById('cam-toggle').onclick = () => {
  mode = mode === 'optical' ? 'thermal' : 'optical';
};

/* ==========================================
   UTILITIES
   ========================================== */
setInterval(() => {
  document.getElementById('clock').innerText = new Date().toLocaleTimeString();
}, 1000);

function pushLog() {
  const logs = ["SYNC_CAVE_01", "PNEUMATIC_SEND", "VOID_DETECTED", "SIGNAL_LOST", "RE-INDEXING"];
  const logEl = document.getElementById('signal-log');
  const div = document.createElement('div');
  div.className = 'signal-item';
  div.innerText = `> ${logs[Math.floor(Math.random()*logs.length)]} [${new Date().getSeconds()}s]`;
  logEl.prepend(div);
  if(logEl.children.length > 5) logEl.lastChild.remove();
}
setInterval(pushLog, 3000);

window.closeModal = () => document.getElementById('modal').classList.remove('open');
document.getElementById('view-large').onclick = () => {
  document.getElementById('modal-title').innerText = currentProject.name;
  document.getElementById('modal-body').innerHTML = svcSVG(currentProject.type);
  document.getElementById('modal').classList.add('open');
};

render();
</script>
</body>
</html>
