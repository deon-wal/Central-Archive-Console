<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>THE BUREAU // NODE_7 // THE MONOLITH</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
        :root {
            --accent: #d4af37;
            --accent-dim: #5c4a1e;
            --bg: #000000;
            --panel: #0d0d0c;
            --rust: #2a1f16;
            --alert: #ff0000;
            --text: #c4beaf;
        }

        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; overflow: hidden; 
            height: 100vh;
        }

        /* --- THE SHUTTER (THE NEW LANDING) --- */
        #shutter {
            position: fixed; inset: 0; z-index: 1000;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), 
                        rgba(212, 175, 55, 0.15) 0%, 
                        rgba(0,0,0,1) 20%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1), opacity 1s;
            border-bottom: 2px solid var(--rust);
        }

        #shutter.open { transform: translateY(-100%); opacity: 0; pointer-events: none; }

        .shutter-logo { font-family: 'Space Mono'; font-weight: 900; letter-spacing: 15px; color: var(--accent); font-size: 3rem; margin-bottom: 20px; text-shadow: 0 0 20px var(--accent-dim); }
        .shutter-sub { font-family: 'Space Mono'; font-size: 10px; letter-spacing: 5px; opacity: 0.5; margin-bottom: 50px; }

        /* --- THE CORE TERMINAL --- */
        #terminal-core {
            display: grid;
            grid-template-columns: 300px 1fr 400px;
            grid-template-rows: 60px 1fr 180px;
            height: 100vh; gap: 10px; padding: 10px;
            background: #050505;
        }

        .panel { background: var(--panel); border: 1px solid var(--rust); overflow: hidden; display: flex; flex-direction: column; position: relative; }
        .panel-header { padding: 8px 12px; background: var(--rust); color: var(--accent); font-size: 9px; font-weight: bold; font-family: 'Space Mono'; display: flex; justify-content: space-between; }

        /* --- INTERACTIVE FS --- */
        .fs-item { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.02); cursor: pointer; font-family: 'Space Mono'; font-size: 10px; transition: 0.3s; }
        .fs-item:hover { background: rgba(212, 175, 55, 0.08); padding-left: 20px; }
        .fs-item.active { border-left: 3px solid var(--accent); background: rgba(212, 175, 55, 0.05); color: #fff; }

        /* --- VISUAL ELEMENTS --- */
        #svg-stage { height: 280px; display: flex; align-items: center; justify-content: center; background: #000; border-bottom: 1px solid var(--rust); padding: 20px; }
        svg { width: 100%; height: 100%; filter: drop-shadow(0 0 8px var(--accent-dim)); }

        canvas { width: 100%; flex: 1; filter: sepia(0.5); }

        #cli-input { width: 100%; background: #000; border: 1px solid var(--accent-dim); color: var(--accent); padding: 12px; font-family: 'Space Mono'; outline: none; font-size: 11px; }

        /* --- CRT FX --- */
        .crt::after {
            content: " "; display: block; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; z-index: 2000; pointer-events: none;
        }

        /* --- UTILS --- */
        .btn-breach { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 15px 40px; font-family: 'Space Mono'; cursor: pointer; border-radius: 50px; transition: 0.3s; font-size: 12px; }
        .btn-breach:hover { background: var(--accent); color: #000; box-shadow: 0 0 30px var(--accent-dim); }
        
        @keyframes rumble { 0% { transform: translate(0,0); } 50% { transform: translate(-2px, 2px); } 100% { transform: translate(0,0); } }
        .glitch-active { animation: rumble 0.1s infinite; filter: contrast(2) invert(0.1); }
    </style>
</head>
<body class="crt">

    <div id="shutter">
        <div class="shutter-logo">THE BUREAU</div>
        <div class="shutter-sub">STATION_TAS_7 // [NODE_7_LOCKED]</div>
        <h1 style="font-size: 5vw; font-weight: 900; margin-bottom: 50px; letter-spacing: -2px;">EVERYTHING IS CONNECTED.</h1>
        <button class="btn-breach" onclick="unlockSystem()">INITIALIZE_BREACH_SEQUENCE</button>
    </div>

    <div id="terminal-core">
        <header class="panel" style="grid-column: 1 / span 3; flex-direction: row; align-items: center; justify-content: space-between; padding: 0 20px;">
            <div style="font-family:'Space Mono'; color:var(--accent); font-weight:700;">NODE_7_INTERNAL_OS</div>
            <div id="clock" style="font-family:'Space Mono'; color:var(--accent);">00:00:00</div>
        </header>

        <aside class="panel">
            <div class="panel-header">FILE_EXPLORER <span>ROOT/VOL_I</span></div>
            <div id="fs-list" style="overflow-y: auto;"></div>
            <div style="padding:15px; border-top:1px solid var(--rust);">
                <div style="font-size:8px; opacity:0.5; margin-bottom:5px;">VOID_ENTROPY_INDEX</div>
                <div style="height:2px; background:#1a1a1a;"><div id="entropy-bar" style="height:100%; background:var(--accent); width:33%;"></div></div>
            </div>
        </aside>

        <main class="panel" style="background:#000;">
            <div class="panel-header">VOID_OSCILLATION // SYNC: <span id="sync-val">--</span></div>
            <canvas id="teleCanvas"></canvas>
        </main>

        <aside class="panel">
            <div class="panel-header">OBJECT_MANIFEST</div>
            <div id="svg-stage"></div>
            <div style="padding: 20px; flex: 1; display: flex; flex-direction: column;">
                <h2 id="obj-title" style="color:var(--accent); font-family:'Space Mono'; font-size: 1rem; margin-bottom: 8px;">--</h2>
                <p id="obj-desc" style="font-size: 11px; line-height: 1.6; opacity: 0.7; height: 100px;"></p>
                <button id="action-btn" class="btn-breach" style="margin-top: auto; padding: 10px; font-size: 10px; border-radius: 0;">SCAN_ANOMALY</button>
            </div>
        </aside>

        <footer class="panel" style="grid-column: 1 / span 3; display: grid; grid-template-columns: 1fr 400px; padding: 12px; gap: 20px; background:#080807;">
            <div id="log-stream" style="font-size:9px; color:var(--accent); overflow:hidden; font-family:'Space Mono'; line-height: 1.4;"></div>
            <input type="text" id="cli-input" placeholder="CMD: MEMO [TEXT], LOGS, CLEAR, WINDEN_33..." autocomplete="off">
        </footer>
    </div>

<script>
/* ========================================
   1. UNIFIED DATA ARCHIVE
   ======================================== */
const archiveData = [
    { name: "The Apparatus", id: "apparatus", freq: 55, desc: "Brass transit device. Utilizing Cesium-137 for non-linear displacement.", svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="var(--accent)" stroke-width="0.5"/><circle cx="50" cy="50" r="30" fill="none" stroke="var(--accent)" stroke-width="1" stroke-dasharray="5 5"><animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite"/></circle></svg>` },
    { name: "Substrate Protocol", id: "substrate", freq: 110, desc: "Recursive architecture for visual telemetry. Direct data layer mapping.", url: "Substrate-Protocol/", svg: `<svg viewBox="0 0 100 100"><rect x="20" y="20" width="60" height="60" fill="none" stroke="var(--accent)" stroke-width="1"/><path d="M20 20 L80 80 M80 20 L20 80" stroke="var(--accent)" stroke-width="0.5"/></svg>` },
    { name: "D.U.E.", id: "due", freq: 44, desc: "Department of Unfinished Events. Central vault for chronological anomalies.", url: "Department-Of-Unfinished-Events-DUE", svg: `<svg viewBox="0 0 100 100"><rect x="20" y="20" width="60" height="20" fill="none" stroke="var(--accent)" stroke-width="1"/><rect x="20" y="50" width="60" height="20" fill="none" stroke="var(--accent)" stroke-width="1"/></svg>` },
    { name: "Noah's Ark", id: "noah", freq: 33, desc: "The cycle is complete. The beginning is the end.", hidden: true, svg: `<svg viewBox="0 0 100 100"><path d="M50 10 L90 85 H10 Z" fill="none" stroke="var(--alert)" stroke-width="2"/></svg>` }
];

/* ========================================
   2. CORE ENGINE
   ======================================== */
let audioCtx, mainOsc, currentFreq = 55;

// Shutter Flashlight
document.addEventListener('mousemove', e => {
    document.getElementById('shutter').style.setProperty('--x', e.clientX + 'px');
    document.getElementById('shutter').style.setProperty('--y', e.clientY + 'px');
});

function unlockSystem() {
    startAudio(55);
    document.getElementById('shutter').classList.add('open');
    addLog("BREACH_SUCCESSFUL. NODE_7_OS_INITIALIZED.");
}

function startAudio(f) {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(mainOsc) mainOsc.stop();
    mainOsc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    mainOsc.frequency.value = f;
    g.gain.value = 0.03;
    mainOsc.connect(g); g.connect(audioCtx.destination);
    mainOsc.start();
}

function populate() {
    const list = document.getElementById('fs-list');
    list.innerHTML = '';
    archiveData.filter(i => !i.hidden).forEach(item => {
        const d = document.createElement('div');
        d.className = 'fs-item';
        d.innerText = `> ${item.name.toUpperCase()}`;
        d.onclick = () => {
            document.querySelectorAll('.fs-item').forEach(el => el.classList.remove('active'));
            d.classList.add('active');
            document.getElementById('obj-title').innerText = item.name;
            document.getElementById('obj-desc').innerText = item.desc;
            document.getElementById('svg-stage').innerHTML = item.svg;
            currentFreq = item.freq;
            startAudio(item.freq);
            addLog(`MOUNTING: ${item.id}`);
        };
        list.appendChild(d);
    });
}

function addLog(m) {
    const s = document.getElementById('log-stream');
    const d = document.createElement('div');
    d.innerText = `[${new Date().toLocaleTimeString()}] > ${m}`;
    s.prepend(d);
}

const cli = document.getElementById('cli-input');
cli.onkeydown = (e) => {
    if(e.key === 'Enter') {
        const val = cli.value.toUpperCase().trim();
        if(val.startsWith('MEMO ')) {
            const m = JSON.parse(localStorage.getItem('b_m') || '[]');
            m.push({t: new Date().toLocaleTimeString(), c: val.substring(5)});
            localStorage.setItem('b_m', JSON.stringify(m));
            addLog("MEMO_SAVED.");
        } else if(val === 'LOGS') {
            const m = JSON.parse(localStorage.getItem('b_m') || '[]');
            m.forEach(i => addLog(`MEMO: ${i.c}`));
        } else if(val === 'WINDEN_33') {
            archiveData[3].hidden = false; populate();
            addLog("AUTH_GRANTED: PROJECT_NOAH_VISIBLE.");
        }
        cli.value = '';
    }
};

const canvas = document.getElementById('teleCanvas');
const ctx = canvas.getContext('2d');
function draw(t) {
    canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.strokeStyle = '#d4af37';
    ctx.beginPath();
    for(let i=0; i<canvas.width; i+=2) {
        const y = canvas.height/2 + Math.sin(i * 0.01 + t * 0.002) * (currentFreq/2);
        ctx.lineTo(i,y);
    }
    ctx.stroke();
    requestAnimationFrame(draw);
}

populate();
draw(0);
setInterval(() => {
    document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    document.getElementById('entropy-bar').style.width = Math.random() * 100 + "%";
    document.getElementById('sync-val').innerText = (98 + Math.random()*2).toFixed(2) + "%";
}, 1000);
</script>
</body>
</html>
