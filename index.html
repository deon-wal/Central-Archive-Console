<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE BUREAU // SIC MUNDUS ARCHIVE</title>
    <style>
        :root {
            --1953: #eab308; /* Dark Yellow */
            --1986: #22ff66; /* CRT Green */
            --accent: var(--1986);
            --bg: #0d0c0a;
            --rust: #7c2d12;
            --panel: rgba(20, 20, 18, 0.95);
        }

        * { cursor: crosshair; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: #d1d5db;
            font-family: "Courier New", monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        /* --- THE STRING THEORY CANVAS --- */
        #connections {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; opacity: 0.3; pointer-events: none;
        }

        /* --- GAUDÍ SKELETAL FRAME --- */
        .console-frame {
            position: relative;
            z-index: 10;
            flex: 1;
            margin: 20px;
            background: var(--panel);
            border: 12px solid #1a1c1d;
            border-radius: 40px 150px 40px 100px; /* Bone-like curves */
            display: grid;
            grid-template-columns: 350px 1fr;
            box-shadow: 20px 20px 60px #000;
            overflow: hidden;
        }

        /* --- LEFT NAVIGATION: THE FILING CABINET --- */
        .sidebar {
            background: rgba(0,0,0,0.3);
            border-right: 2px solid var(--rust);
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .era-selector {
            margin-bottom: 40px;
            border: 1px solid var(--accent);
            padding: 10px;
        }

        .era-btn {
            background: transparent; border: none; color: var(--accent);
            width: 100%; text-align: left; padding: 10px;
            font-size: 0.8rem; opacity: 0.5; transition: 0.3s;
        }

        .era-btn.active { opacity: 1; font-weight: bold; background: rgba(255,255,255,0.05); }

        /* --- PROJECT GRID --- */
        .main-view {
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .project-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 0 40px 0 0;
            transition: 0.4s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .project-card:hover {
            border-color: var(--accent);
            transform: translateX(10px);
            background: rgba(255,255,255,0.05);
            box-shadow: -10px 0 0 var(--accent);
        }

        .project-card h3 { color: var(--accent); margin: 0 0 10px; text-transform: uppercase; letter-spacing: 2px; }
        .project-card p { font-size: 0.85rem; line-height: 1.6; opacity: 0.7; }

        /* --- LIVE TELEMETRY (BRAZIL STYLE) --- */
        .hud-corner {
            position: absolute; bottom: 20px; right: 20px;
            width: 250px; background: #000; border: 1px solid var(--rust);
            padding: 10px; font-size: 0.6rem; color: var(--accent);
        }

        .glitch { animation: glitch 1s infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-1px, 1px); opacity: 0.8; }
            40% { transform: translate(1px, -1px); }
            100% { transform: translate(0); }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--rust); }
    </style>
</head>
<body>

<canvas id="connections"></canvas>

<div class="console-frame">
    <aside class="sidebar">
        <div style="font-size: 0.6rem; opacity: 0.4; margin-bottom: 10px;">ID_VERIFY: 8821-TAS</div>
        <h2 style="font-size: 1.2rem; color: var(--accent); letter-spacing: 4px;">THE BUREAU</h2>
        
        <div class="era-selector">
            <div style="font-size: 0.5rem; margin-bottom: 5px; opacity: 0.5;">TEMPORAL_FOCUS</div>
            <button class="era-btn" onclick="setEra('1953')">1953 // THE NUCLEAR DAWN</button>
            <button class="era-btn active" onclick="setEra('1986')">1986 // THE CRT ERA</button>
            <button class="era-btn" onclick="setEra('2019')">2019 // THE COLLAPSE</button>
        </div>

        <div style="flex: 1; font-size: 0.7rem; line-height: 2; opacity: 0.6;">
            [X] Everything is Connected.<br>
            [X] The beginning is the end.<br>
            [X] Tic-Toc. Tic-Toc.
        </div>

        <div id="clock" style="font-size: 1.1rem; border-top: 1px solid var(--rust); padding-top: 10px;">00:00:00</div>
    </aside>

    <main class="main-view">
        <div style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--rust); margin-bottom: 30px; padding-bottom: 10px;">
            <span class="glitch">STATUS: TRANSMITTING...</span>
            <span style="opacity: 0.4;">HOBART_STATION // TAS</span>
        </div>

        <div id="project-list">
            </div>

        <div class="hud-corner">
            <div style="border-bottom: 1px solid var(--accent); margin-bottom: 5px; padding-bottom: 3px;">SIGNAL_PACKETS</div>
            <div id="signal-log"></div>
        </div>
    </main>
</div>

<script>
    const projects = [
        { name: "Substrate Protocol", desc: "A recursive architecture for visual telemetry. Deep-layer data mapping.", url: "https://deon-wal.github.io/Substrate-Protocol/" },
        { name: "Department of Unfinished Events", name_short: "D.U.E.", desc: "The central repository for chronologically displaced artifacts and records.", url: "https://deon-wal.github.io/Department-Of-Unfinished-Events-DUE/" },
        { name: "Anomaly Observatory", desc: "Live monitoring of seismic and solar collapse. Everything is connected.", url: "https://deon-wal.github.io/Anomaly-Observatory/" }
    ];

    // Populate Projects
    const list = document.getElementById('project-list');
    projects.forEach(p => {
        list.innerHTML += `
            <a href="${p.url}" target="_blank" class="project-card">
                <h3>${p.name_short || p.name}</h3>
                <p>${p.desc}</p>
                <div style="margin-top: 10px; font-size: 0.6rem; opacity: 0.4;">ACCESS_LEVEL: ALPHA-9</div>
            </a>
        `;
    });

    // Era Switcher Logic
    function setEra(year) {
        const root = document.documentElement;
        document.querySelectorAll('.era-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        if(year === '1953') {
            root.style.setProperty('--accent', 'var(--1953)');
        } else if(year === '1986') {
            root.style.setProperty('--accent', 'var(--1986)');
        } else {
            root.style.setProperty('--accent', '#ffffff');
        }
    }

    // Canvas "String Theory" Background
    const canvas = document.getElementById('connections');
    const ctx = canvas.getContext('2d');
    let width, height;

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function draw() {
        ctx.clearRect(0, 0, width, height);
        ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
        ctx.lineWidth = 0.5;

        const time = Date.now() * 0.0005;
        for(let i=0; i<8; i++) {
            ctx.beginPath();
            ctx.moveTo(0, height * Math.sin(time + i));
            ctx.bezierCurveTo(width/3, height/i, width/1.5, height * Math.cos(time), width, height/2);
            ctx.stroke();
        }
        requestAnimationFrame(draw);
    }
    draw();

    // Signal Log
    const log = document.getElementById('signal-log');
    const msgs = ["PNEUMATIC_TUBE_READY", "WINDEN_CAVE_SYNC", "MAGNITUDE_4.2", "SIC_MUNDUS_EST", "LOG_FILE_042_OPEN"];
    setInterval(() => {
        const d = document.createElement('div');
        d.innerText = `> ${msgs[Math.floor(Math.random()*msgs.length)]}`;
        log.prepend(d);
        if(log.children.length > 4) log.removeChild(log.lastChild);
    }, 3000);

    // Clock
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>

</body>
</html>
