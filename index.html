<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>THE BUREAU // NODE_7 // MASTER_OS</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
        :root {
            --accent: #d4af37;
            --accent-dim: #5c4a1e;
            --bg: #000000;
            --panel: #0d0d0c;
            --rust: #2a1f16;
            --alert: #ff0000;
            --text: #c4beaf;
            --burn: 0;
        }

        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; overflow: hidden; 
            height: 100vh;
        }

        /* --- THE SHUTTER (NEURAL LINK) --- */
        #shutter {
            position: fixed; inset: 0; z-index: 10000;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), 
                        rgba(212, 175, 55, 0.2) 0%, 
                        rgba(0,0,0,1) 15%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 1.5s cubic-bezier(0.8, 0, 0.2, 1), opacity 1s;
        }
        #shutter.open { transform: scale(1.5); opacity: 0; pointer-events: none; }

        /* --- THE OS INTERFACE --- */
        #os-workspace {
            position: relative; width: 100vw; height: 100vh;
            background: #050505; perspective: 1000px;
        }

        .window {
            position: absolute; background: var(--panel); border: 1px solid var(--rust);
            display: flex; flex-direction: column; min-width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: filter 0.3s; z-index: 10;
        }

        .window-header {
            padding: 10px; background: var(--rust); color: var(--accent);
            font-family: 'Space Mono'; font-size: 10px; font-weight: bold;
            cursor: grab; display: flex; justify-content: space-between;
            user-select: none;
        }

        /* --- COMPONENTS --- */
        #nav-list { overflow-y: auto; flex: 1; max-height: 400px; }
        .fs-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); cursor: pointer; font-family: 'Space Mono'; font-size: 10px; }
        .fs-item:hover { background: rgba(212,175,55,0.1); }
        .fs-item.active { border-left: 3px solid var(--accent); background: rgba(212, 175, 55, 0.05); }

        #svg-stage { height: 300px; display: flex; align-items: center; justify-content: center; background: #000; border-bottom: 1px solid var(--rust); padding: 20px; }
        svg { width: 100%; height: 100%; filter: drop-shadow(0 0 10px var(--accent-dim)); }

        #teleCanvas { width: 100%; height: 300px; background: #000; }

        #cli-input { width: 100%; background: #000; border: 1px solid var(--accent-dim); color: var(--accent); padding: 15px; font-family: 'Space Mono'; outline: none; }
        #log-stream { height: 120px; font-size: 9px; color: var(--accent); padding: 10px; overflow: hidden; font-family: 'Space Mono'; }

        /* --- CRT & GLITCH --- */
        .crt::after {
            content: " "; display: block; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; z-index: 5000; pointer-events: none;
            opacity: 0.5; pointer-events: none;
        }

        .rumble { animation: rumble 0.1s infinite; }
        @keyframes rumble { 0% { transform: translate(0,0); } 50% { transform: translate(-2px, 2px); } 100% { transform: translate(0,0); } }

        .btn-breach { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 15px 40px; font-family: 'Space Mono'; cursor: pointer; border-radius: 50px; transition: 0.3s; }
        .btn-breach:hover { background: var(--accent); color: #000; }
    </style>
</head>
<body class="crt">

    <div id="shutter">
        <div style="font-family:'Space Mono'; color:var(--accent); letter-spacing:10px; margin-bottom:20px;">THE BUREAU</div>
        <h1 style="font-size: 5vw; font-weight: 900; margin-bottom: 40px; color:#fff;">EVERYTHING IS CONNECTED.</h1>
        <button class="btn-breach" onclick="unlockSystem()">INITIALIZE_BREACH_SEQUENCE</button>
    </div>

    <div id="os-workspace">
        
        <div class="window" style="top:20px; left:20px; width:calc(100% - 40px); z-index:1;">
            <div class="window-header" style="cursor:default;">
                <div>NODE_7_SYSTEM_INTEGRITY</div>
                <div>VOID_INTEGRITY: <span id="integrity-val">99%</span> // <span id="clock">00:00:00</span></div>
            </div>
        </div>

        <div class="window drag" style="top:100px; left:20px; width:320px;">
            <div class="window-header">REGISTRY_VOL_I <span>[DRAG]</span></div>
            <div id="nav-list"></div>
            <div style="padding:15px; border-top:1px solid var(--rust);">
                <div style="font-size:8px; color:var(--accent);">CORE_ENTROPY</div>
                <div style="height:2px; background:#111; margin-top:5px;"><div id="entropy-fill" style="height:100%; background:var(--accent); width:33%;"></div></div>
            </div>
        </div>

        <div class="window drag" style="top:100px; left:360px; width:calc(100% - 800px);">
            <div class="window-header">VOID_OSCILLATION <span>[DRAG]</span></div>
            <canvas id="teleCanvas"></canvas>
        </div>

        <div class="window drag" style="top:100px; right:20px; width:400px;">
            <div class="window-header">MANIFEST_ANALYSIS <span>[DRAG]</span></div>
            <div id="svg-stage"></div>
            <div style="padding:20px;">
                <h2 id="obj-title" style="color:var(--accent); font-family:'Space Mono'; margin-bottom:10px;">--</h2>
                <p id="obj-desc" style="font-size:11px; line-height:1.6; height:80px; opacity:0.8;"></p>
                <button class="btn-breach" style="width:100%; border-radius:0; padding:10px; font-size:10px;" id="action-btn">INIT_SCAN</button>
            </div>
        </div>

        <div class="window drag" style="bottom:20px; left:20px; width:calc(100% - 40px);">
            <div class="window-header">BUREAU_TERMINAL_V7 <span>[DRAG]</span></div>
            <div id="log-stream"></div>
            <input type="text" id="cli-input" placeholder="CMD: MEMO [TEXT], LOGS, EXPORT, WINDEN_33..." autocomplete="off">
        </div>

    </div>

<script>
/* ========================================
   1. MASTER ARCHIVE DATA
   ======================================== */
const archiveData = [
  { name: "The Apparatus", id: "apparatus", freq: 55, desc: "Dual-chamber brass device utilizing Cesium-137. Key for transit.", svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="var(--accent)" stroke-width="0.2"/><circle cx="50" cy="50" r="35" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="10 5"><animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" repeatCount="indefinite"/></circle><rect x="35" y="35" width="30" height="30" fill="none" stroke="var(--accent)" stroke-width="0.5"><animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="10s" repeatCount="indefinite"/></rect></svg>` },
  { name: "Substrate Protocol", id: "substrate", freq: 110, desc: "Recursive architecture for visual telemetry. Deep mapping.", url: "Substrate-Protocol/", svg: `<svg viewBox="0 0 100 100"><path d="M10 10 H90 V90 H10 Z M25 25 H75 V75 H25 Z" fill="none" stroke="var(--accent)" stroke-width="1"/><line x1="10" y1="10" x2="90" y2="90" stroke="var(--accent)" stroke-width="0.2"/></svg>` },
  { name: "D.U.E.", id: "due", freq: 44, desc: "Department of Unfinished Events. Displaced records.", url: "Department-Of-Unfinished-Events-DUE", svg: `<svg viewBox="0 0 100 100"><rect x="20" y="20" width="60" height="60" fill="none" stroke="var(--accent)" stroke-width="1"/><path d="M20 40 H80 M20 60 H80" stroke="var(--accent)" stroke-width="0.5"/></svg>` },
  { name: "Project Noah", id: "noah", freq: 33, desc: "The cycle is complete. Sic Mundus Creatus Est.", hidden: true, svg: `<svg viewBox="0 0 100 100"><path d="M50 15 L85 80 H15 Z" fill="none" stroke="#ff0000" stroke-width="2"/></svg>` }
];

/* ========================================
   2. AUDIO ENGINE (BINAURAL)
   ======================================== */
let audioCtx, mainOsc, panner;
const startAudio = (f) => {
    if(!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        panner = audioCtx.createStereoPanner();
        panner.connect(audioCtx.destination);
    }
    if(mainOsc) mainOsc.stop();
    mainOsc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    mainOsc.frequency.value = f;
    g.gain.value = 0.03;
    mainOsc.connect(g); g.connect(panner);
    mainOsc.start();
};

/* ========================================
   3. SYSTEM LOGIC
   ======================================== */
document.addEventListener('mousemove', e => {
    document.getElementById('shutter').style.setProperty('--x', e.clientX + 'px');
    document.getElementById('shutter').style.setProperty('--y', e.clientY + 'px');
    if(panner) {
        const panVal = (e.clientX / window.innerWidth) * 2 - 1;
        panner.pan.setValueAtTime(panVal, audioCtx.currentTime);
    }
});

function unlockSystem() {
    startAudio(55);
    document.getElementById('shutter').classList.add('open');
    addLog("BREACH_SUCCESSFUL. NODE_7 ONLINE.");
}

// Drag Logic
let activeWin = null, offset = [0,0];
document.querySelectorAll('.window-header').forEach(h => {
    h.onmousedown = (e) => {
        if(!h.parentElement.classList.contains('drag')) return;
        activeWin = h.parentElement;
        activeWin.style.zIndex = 100;
        offset = [e.clientX - activeWin.offsetLeft, e.clientY - activeWin.offsetTop];
    };
});
document.onmousemove = (e) => {
    if(activeWin) {
        activeWin.style.left = (e.clientX - offset[0]) + 'px';
        activeWin.style.top = (e.clientY - offset[1]) + 'px';
    }
};
document.onmouseup = () => { if(activeWin) activeWin.style.zIndex = 10; activeWin = null; };

function populate() {
    const list = document.getElementById('nav-list');
    list.innerHTML = '';
    archiveData.filter(i => !i.hidden).forEach(item => {
        const d = document.createElement('div');
        d.className = 'fs-item';
        d.innerText = `> ${item.name.toUpperCase()}`;
        d.onclick = () => {
            document.querySelectorAll('.fs-item').forEach(el => el.classList.remove('active'));
            d.classList.add('active');
            document.getElementById('obj-title').innerText = item.name;
            document.getElementById('obj-desc').innerText = item.desc;
            document.getElementById('svg-stage').innerHTML = item.svg;
            startAudio(item.freq);
            
            const btn = document.getElementById('action-btn');
            if(item.url) {
                btn.innerText = "LAUNCH_REMOTE_PROTOCOL";
                btn.onclick = () => window.open(item.url, '_blank');
            } else {
                btn.innerText = "INITIALIZE_SCAN";
                btn.onclick = () => { document.body.classList.add('rumble'); setTimeout(()=>document.body.classList.remove('rumble'),200); };
            }
        };
        list.appendChild(d);
    });
}

const cli = document.getElementById('cli-input');
cli.onkeydown = (e) => {
    if(e.key === 'Enter') {
        const val = cli.value.toUpperCase().trim();
        if(val.startsWith('MEMO ')) {
            const m = JSON.parse(localStorage.getItem('b_m') || '[]');
            m.push({t: new Date().toLocaleTimeString(), c: val.substring(5)});
            localStorage.setItem('b_m', JSON.stringify(m));
            addLog("MEMO_SAVED.");
        } else if(val === 'LOGS') {
            const m = JSON.parse(localStorage.getItem('b_m') || '[]');
            m.forEach(i => addLog(`MEMO: ${i.c}`));
        } else if(val === 'EXPORT') {
            const m = JSON.parse(localStorage.getItem('b_m') || '[]');
            const blob = new Blob([m.map(i => `[${i.t}] REPORT: ${i.c}`).join('\n')], {type: 'text/plain'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'INCIDENT_REPORT.txt'; a.click();
        } else if(val === 'WINDEN_33') {
            archiveData[3].hidden = false; populate();
            addLog("AUTH_GRANTED.");
        }
        cli.value = '';
    }
};

function addLog(m) {
    const s = document.getElementById('log-stream');
    const d = document.createElement('div');
    d.innerText = `[${new Date().toLocaleTimeString()}] > ${m}`;
    s.prepend(d);
}

const canvas = document.getElementById('teleCanvas');
const ctx = canvas.getContext('2d');
function draw(t) {
    canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 1;
    ctx.beginPath();
    for(let i=0; i<canvas.width; i+=2) {
        const y = canvas.height/2 + Math.sin(i * 0.01 + t * 0.002) * 50;
        ctx.lineTo(i,y);
    }
    ctx.stroke();
    requestAnimationFrame(draw);
}

// Hardware Sync
if(navigator.getBattery) {
    navigator.getBattery().then(bat => {
        const up = () => document.getElementById('integrity-val').innerText = (bat.level * 100).toFixed(0) + "%";
        bat.addEventListener('levelchange', up); up();
    });
}

populate(); draw(0);
setInterval(() => {
    document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    document.getElementById('entropy-fill').style.width = Math.random()*100 + "%";
}, 1000);
</script>
</body>
</html>
